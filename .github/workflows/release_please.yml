name: Release Please

on:
  workflow_dispatch:
  push:
    branches: main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To update the release PR branch
      issues: write # To create the release issue
      pull-requests: write # To create/update the release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: simple
