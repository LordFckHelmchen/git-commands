name: Release Please

on:
  workflow_dispatch:
  push:
    branches: main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To update the release PR branch
      issues: write # To create the release issue
      pull-requests: write # To create/update the release PR
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          release-type: simple
