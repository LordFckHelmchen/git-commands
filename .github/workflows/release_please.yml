name: Release Please

on:
  workflow_dispatch:
  push:
    branches: main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To update the release PR branch
      issues: write # To create the release issue
      pull-requests: write # To create/update the release PR
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          release-type: simple
