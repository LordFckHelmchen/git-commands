name: Prek-Hooks Update

on:
  schedule:
    - cron: "42 12 * * 5" # Run weekly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  prek-hooks-update:
    name: Auto-update prek-hooks
    runs-on: ubuntu-latest
    permissions:
      contents: write # To update the pre-commit config & commit the changes
      pull-requests: write # To create the PR
    env:
      COMMIT_MSG: "build(deps): Update prek-hooks"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # Avoid leaking secrets

      - name: Install prek
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
        with:
          install-only: true # Do not immediately call `prek run`

      - run: prek autoupdate --freeze

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: prek/autoupdate
          title: ${{ env.COMMIT_MSG }}
          commit-message: ${{ env.COMMIT_MSG }}
          body: "" # Empty
          labels: dependencies
